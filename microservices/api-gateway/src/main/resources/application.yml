server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: workflow-service
          uri: lb://workflow-service
          predicates:
            - Path=/api/workflows/**
          filters:
            - StripPrefix=1
            - name: AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: workflowCircuitBreaker
                fallbackUri: forward:/fallback/workflow

        - id: integration-service
          uri: lb://integration-service
          predicates:
            - Path=/api/integrations/**
          filters:
            - StripPrefix=1
            - name: AuthenticationFilter

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1
            - name: AuthenticationFilter

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-change-in-production-must-be-at-least-256-bits}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

resilience4j:
  circuitbreaker:
    instances:
      workflowCircuitBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.teasui.crm: DEBUG
