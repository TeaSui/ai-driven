name: Workflow Automation Tests

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch: # Allow manual trigger

jobs:
  build-java:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Build Java Modules

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java 21
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'gradle'

      - name: Build all modules (including pipeline-handlers and agent-handlers)
        working-directory: ./application
        run: ./gradlew buildAll --no-daemon

      - name: Verify pipeline-handlers JAR
        run: |
          ls -la application/pipeline-handlers/build/libs/pipeline-handlers-all.jar
          echo "Pipeline handlers JAR built successfully"

      - name: Verify agent-handlers JAR
        run: |
          ls -la application/agent-handlers/build/libs/agent-handlers-all.jar
          echo "Agent handlers JAR built successfully"

      - name: Run unit tests
        working-directory: ./application
        run: ./gradlew test --no-daemon

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: lambda-jars
          path: |
            application/pipeline-handlers/build/libs/pipeline-handlers-all.jar
            application/agent-handlers/build/libs/agent-handlers-all.jar
            application/lambda-handlers/build/libs/lambda-handlers-all.jar

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-java

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Install dependencies
        working-directory: ./tests
        run: npm ci

      - name: Run smoke tests
        working-directory: ./tests
        run: npm test -- --testPathPattern=smoke --no-coverage
        env:
          TEST_JIRA_URL: ${{ secrets.TEST_JIRA_URL }}
          TEST_JIRA_EMAIL: ${{ secrets.TEST_JIRA_EMAIL }}
          TEST_JIRA_TOKEN: ${{ secrets.TEST_JIRA_TOKEN }}
          TEST_BB_WORKSPACE: ${{ secrets.TEST_BB_WORKSPACE }}
          TEST_BB_REPO: ${{ secrets.TEST_BB_REPO }}
          TEST_BB_USERNAME: ${{ secrets.TEST_BB_USERNAME }}
          TEST_BB_PASSWORD: ${{ secrets.TEST_BB_PASSWORD }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          TEST_STATE_MACHINE_ARN: ${{ secrets.TEST_STATE_MACHINE_ARN }}
          TEST_DYNAMODB_TABLE: ${{ secrets.TEST_DYNAMODB_TABLE }}
          TEST_CLEANUP: false

      - name: Run integration tests
        working-directory: ./tests
        run: npm run test:integration
        env:
          TEST_JIRA_URL: ${{ secrets.TEST_JIRA_URL }}
          TEST_JIRA_EMAIL: ${{ secrets.TEST_JIRA_EMAIL }}
          TEST_JIRA_TOKEN: ${{ secrets.TEST_JIRA_TOKEN }}
          TEST_BB_WORKSPACE: ${{ secrets.TEST_BB_WORKSPACE }}
          TEST_BB_REPO: ${{ secrets.TEST_BB_REPO }}
          TEST_BB_USERNAME: ${{ secrets.TEST_BB_USERNAME }}
          TEST_BB_PASSWORD: ${{ secrets.TEST_BB_PASSWORD }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TEST_BEDROCK_MODEL: ${{ secrets.TEST_BEDROCK_MODEL }}
          TEST_CLEANUP: false

      - name: Run workflow integration tests
        working-directory: ./tests
        run: npm run test:workflow
        env:
          TEST_JIRA_URL: ${{ secrets.TEST_JIRA_URL }}
          TEST_JIRA_EMAIL: ${{ secrets.TEST_JIRA_EMAIL }}
          TEST_JIRA_TOKEN: ${{ secrets.TEST_JIRA_TOKEN }}
          TEST_BB_WORKSPACE: ${{ secrets.TEST_BB_WORKSPACE }}
          TEST_BB_REPO: ${{ secrets.TEST_BB_REPO }}
          TEST_BB_USERNAME: ${{ secrets.TEST_BB_USERNAME }}
          TEST_BB_PASSWORD: ${{ secrets.TEST_BB_PASSWORD }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TEST_STATE_MACHINE_ARN: ${{ secrets.TEST_STATE_MACHINE_ARN }}
          TEST_DYNAMODB_TABLE: ${{ secrets.TEST_DYNAMODB_TABLE }}
          TEST_CLEANUP: false

      - name: Run E2E tests (main/master branch only)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        working-directory: ./tests
        run: npm run test:e2e
        timeout-minutes: 15
        env:
          TEST_JIRA_URL: ${{ secrets.TEST_JIRA_URL }}
          TEST_JIRA_EMAIL: ${{ secrets.TEST_JIRA_EMAIL }}
          TEST_JIRA_TOKEN: ${{ secrets.TEST_JIRA_TOKEN }}
          TEST_BB_WORKSPACE: ${{ secrets.TEST_BB_WORKSPACE }}
          TEST_BB_REPO: ${{ secrets.TEST_BB_REPO }}
          TEST_BB_USERNAME: ${{ secrets.TEST_BB_USERNAME }}
          TEST_BB_PASSWORD: ${{ secrets.TEST_BB_PASSWORD }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TEST_STATE_MACHINE_ARN: ${{ secrets.TEST_STATE_MACHINE_ARN }}
          TEST_DYNAMODB_TABLE: ${{ secrets.TEST_DYNAMODB_TABLE }}
          TEST_BEDROCK_MODEL: ${{ secrets.TEST_BEDROCK_MODEL }}
          TEST_CLEANUP: true

      - name: Generate coverage report
        working-directory: ./tests
        run: npm run test:coverage
        env:
          TEST_JIRA_URL: ${{ secrets.TEST_JIRA_URL }}
          TEST_JIRA_EMAIL: ${{ secrets.TEST_JIRA_EMAIL }}
          TEST_JIRA_TOKEN: ${{ secrets.TEST_JIRA_TOKEN }}
          TEST_BB_WORKSPACE: ${{ secrets.TEST_BB_WORKSPACE }}
          TEST_BB_REPO: ${{ secrets.TEST_BB_REPO }}
          TEST_BB_USERNAME: ${{ secrets.TEST_BB_USERNAME }}
          TEST_BB_PASSWORD: ${{ secrets.TEST_BB_PASSWORD }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          TEST_CLEANUP: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          directory: ./tests/coverage
          flags: workflow-tests
          name: workflow-automation-tests

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.node-version }}
          path: |
            tests/coverage/
            tests/*.log

  cdk-synth:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: CDK Synth (Validate Infrastructure)

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install CDK dependencies
        working-directory: ./infrastructure
        run: npm ci

      - name: Build TypeScript
        working-directory: ./infrastructure
        run: npx tsc
